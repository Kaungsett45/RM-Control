version: '3.8'

services:
  origin:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-origin
    ports:
      - "1935:1935"
      - "8554:8554"
      - "8888:8888"
      - "9997:9997"
    environment:
      # These variables override settings in mediamtx.yml
      - MTX_AUTHMETHOD=internal
      - MTX_AUTHINTERNALUSERS_0_USER=${MTX_ADMIN_USER}
      - MTX_AUTHINTERNALUSERS_0_PASS=${MTX_ADMIN_PASS}
      - MTX_AUTHINTERNALUSERS_0_PERMISSIONS_0_ACTION=api
      - MTX_AUTHINTERNALUSERS_0_PERMISSIONS_1_ACTION=read
      - MTX_AUTHINTERNALUSERS_0_PERMISSIONS_2_ACTION=publish
    volumes:
      - ./origin/mediamtx.yml:/mediamtx.yml
    networks:
      - media-net

  edge-1:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-edge-1
    ports:
      - "8889:8888"
    environment:
      - MTX_PATHS_ALL_SOURCE=rtsp://${MTX_ADMIN_USER}:${MTX_ADMIN_PASS}@origin:8554/%name%
    volumes:
      - ./edge/mediamtx.yml:/mediamtx.yml
    networks:
      - media-net

  edge-2:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-edge-2
    ports:
      - "8890:8888"
    environment:
      - MTX_PATHS_ALL_SOURCE=rtsp://${MTX_ADMIN_USER}:${MTX_ADMIN_PASS}@origin:8554/%name%
    volumes:
      - ./edge/mediamtx.yml:/mediamtx.yml
    networks:
      - media-net

  api-manager:
    build: ./api-manager
    container_name: api-manager
    ports:
      - "${API_MANAGER_PORT}:3000"
    environment:
      - MEDIAMTX_API_URL=http://origin:9997/v3
      - MTX_ADMIN_USER=${MTX_ADMIN_USER}
      - MTX_ADMIN_PASS=${MTX_ADMIN_PASS}
    networks:
      - media-net

networks:
  media-net:
    driver: bridge
