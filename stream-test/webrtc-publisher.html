<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Studio | DRY Publisher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1;
            --secondary: #0ea5e9;
            --bg: #09090b;
            --surface: #18181b;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .studio-header { text-align: center; margin-bottom: 3rem; }
        .studio-header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #studio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card-label {
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .video-viewport {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 1.25rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }

        .live-tag {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            background: var(--danger);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            display: none;
            z-index: 10;
        }

        .input-group {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group span { color: var(--text-muted); }
        .input-group input {
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { filter: brightness(1.1); }
        .btn.active { background: var(--danger); }
        .btn:disabled { background: #27272a; color: #52525b; cursor: not-allowed; }

        .log-box {
            font-family: monospace;
            font-size: 0.7rem;
            background: #000;
            padding: 0.75rem;
            border-radius: 0.75rem;
            height: 80px;
            overflow-y: auto;
            color: #4ade80;
        }

        .mobile-warning { color: #f87171; font-size: 0.75rem; margin-top: -0.5rem; }

        @media (max-width: 768px) {
            #studio-grid { grid-template-columns: 1fr; }
            .studio-header h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

    <div class="studio-header">
        <h1>Stream Studio</h1>
    </div>

    <div id="studio-grid">
        <!-- Cards generated via JS -->
    </div>

    <script>
        const CONFIG = [
            { id: 'cam', label: 'Camera', color: 'var(--accent)', path: 'cam1', mirror: true },
            { id: 'scr', label: 'Screen', color: 'var(--secondary)', path: 'screen1', mirror: false }
        ];

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const STUN = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        class Streamer {
            constructor(cfg) {
                this.cfg = cfg;
                this.pc = null;
                this.stream = null;
                this.initUI();
            }

            initUI() {
                const grid = document.getElementById('studio-grid');
                const html = `
                    <div class="card" id="${this.cfg.id}-card">
                        <div class="card-label">Source: ${this.cfg.label}</div>
                        <div class="video-viewport">
                            <div class="live-tag" id="${this.cfg.id}-tag">LIVE</div>
                            <video id="${this.cfg.id}-video" class="${this.cfg.mirror ? 'mirror' : ''}" autoplay playsinline muted></video>
                        </div>
                        <div class="input-group">
                            <span>/</span>
                            <input type="text" id="${this.cfg.id}-path" value="${this.cfg.path}">
                        </div>
                        ${(this.cfg.id === 'scr' && isMobile) ? '<div class="mobile-warning">Screen share not available on mobile.</div>' : ''}
                        <button id="${this.cfg.id}-btn" class="btn" style="background: ${this.cfg.color}">${this.cfg.id === 'cam' ? 'Start Broadcast' : 'Start Screen Share'}</button>
                        <div id="${this.cfg.id}-log" class="log-box">> Ready.</div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);

                // Bind elements
                this.btn = document.getElementById(`${this.cfg.id}-btn`);
                this.video = document.getElementById(`${this.cfg.id}-video`);
                this.path = document.getElementById(`${this.cfg.id}-path`);
                this.logEl = document.getElementById(`${this.cfg.id}-log`);
                this.badge = document.getElementById(`${this.cfg.id}-tag`);

                if (this.cfg.id === 'scr' && isMobile) {
                    this.btn.disabled = true;
                    this.btn.textContent = "Unavailable";
                } else {
                    this.btn.onclick = () => this.toggle();
                }
            }

            log(msg, error = false) {
                const div = document.createElement('div');
                div.style.color = error ? '#f87171' : '#4ade80';
                div.textContent = `> ${msg}`;
                this.logEl.prepend(div);
            }

            async toggle() {
                if (this.pc) this.stop();
                else await this.start();
            }

            async start() {
                try {
                    this.log("Initializing...");
                    this.stream = (this.cfg.id === 'cam') 
                        ? await navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                        : await navigator.mediaDevices.getDisplayMedia({ video: true });

                    if (this.cfg.id === 'scr') this.stream.getVideoTracks()[0].onended = () => this.stop();

                    this.video.srcObject = this.stream;
                    this.pc = new RTCPeerConnection(STUN);

                    this.stream.getTracks().forEach(track => {
                        const tr = this.pc.addTransceiver(track, { direction: 'sendonly', streams: [this.stream] });
                        if (track.kind === 'video' && 'getCapabilities' in RTCRtpSender) {
                            const h264 = RTCRtpSender.getCapabilities('video').codecs.filter(c => c.mimeType === 'video/H264' && c.sdpFmtpLine?.includes('packetization-mode=1'));
                            if (h264.length > 0) tr.setCodecPreferences(h264);
                        }
                    });

                    const offer = await this.pc.createOffer();
                    await this.pc.setLocalDescription(offer);

                    const res = await fetch(`http://localhost:8889/${this.path.value}/whip`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/sdp' },
                        body: this.pc.localDescription.sdp
                    });

                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    await this.pc.setRemoteDescription({ type: 'answer', sdp: await res.text() });

                    this.log("Live!");
                    this.btn.textContent = "Stop";
                    this.btn.classList.add('active');
                    this.badge.style.display = 'block';
                    this.path.disabled = true;
                } catch (e) {
                    this.log(e.message, true);
                    this.stop();
                }
            }

            stop() {
                if (this.pc) { this.pc.close(); this.pc = null; }
                if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
                this.video.srcObject = null;
                this.btn.textContent = this.cfg.id === 'cam' ? "Start Broadcast" : "Start Screen Share";
                this.btn.classList.remove('active');
                this.badge.style.display = 'none';
                this.path.disabled = false;
                this.log("Disconnected.");
            }
        }

        // Initialize from Config
        CONFIG.forEach(cfg => new Streamer(cfg));
    </script>
</body>
</html>
